<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Mapping Photos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100vw; z-index: 1; background-color: #5ce1e6; }
        
        /* Filter CSS Gratis untuk mengubah peta standar jadi hamparan warna biru cerah bersih sesuai mockup video */
        .leaflet-tile-container { 
            filter: hue-rotate(145deg) saturate(1.4) brightness(1.1) contrast(0.9); 
        }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .bg-hijau-terang { background-color: #00FF33 !important; }
        .text-hijau-terang { color: #00FF33 !important; }
        .border-hijau-terang { border-color: #00FF33 !important; }

        /* Efek Animasi Modal Mengambang di Tengah */
        .modal-center {
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
            width: 90vw !important; 
            min-width: 320px; 
            max-width: 480px; 
            max-height: 90vh !important;
            overflow-y: auto !important;
        }
        .modal-center.show {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Styling Popup Peta menyesuaikan Mockup Hijau Terang bersudut membulat */
        .leaflet-popup-content-wrapper {
            background: #00FF33 !important;
            color: #000000 !important;
            border: 2px solid #000000 !important;
            border-radius: 16px !important;
            padding: 4px !important;
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1) !important;
        }
        .leaflet-popup-tip { 
            background: #00FF33 !important; 
            border-left: 2px solid #000000;
            border-bottom: 2px solid #000000;
        }
        .leaflet-popup-close-button { color: #000000 !important; font-weight: bold !important; font-size: 16px !important; }
    </style>
</head>
<body class="bg-white overflow-hidden font-sans antialiased">

    <div id="splash-screen" class="fixed inset-0 bg-white flex items-center justify-center transition-opacity duration-500" style="z-index: 9999;">
        <div class="w-24 h-24 bg-hijau-terang rounded-2xl flex items-center justify-center relative shadow-lg animate-bounce border-2 border-black">
            <div class="w-12 h-12 bg-white rounded-lg border-2 border-black"></div>
            <div class="absolute -bottom-3 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-8 border-l-transparent border-r-8 border-r-transparent border-t-8 border-t-hijau-terang" style="border-left-width: 12px; border-right-width: 12px; border-top-width: 14px;"></div>
        </div>
    </div>

    <div class="absolute top-0 left-0 right-0 bg-hijau-terang p-4 flex justify-between items-center border-b-2 border-black" style="z-index: 1000;">
        <h1 class="text-black font-bold text-lg tracking-wide">Project mapping Photos</h1>
        <button id="menu-btn" class="text-black focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </div>

    <div id="dropdown-menu" class="hidden absolute top-16 right-4 bg-hijau-terang p-4 rounded-xl border-2 border-black shadow-lg w-48 text-black" style="z-index: 1000;">
        <p class="font-bold mb-2 border-b border-black pb-1">Mode</p>
        <label class="flex items-center mb-2 cursor-pointer font-semibold">
            <input type="radio" name="theme" value="gelap" class="mr-2 accent-black"> Gelap</label>
        <label class="flex items-center cursor-pointer font-semibold">
            <input type="radio" name="theme" value="terang" checked class="mr-2 accent-black"> Terang</label>
    </div>

    <div id="kapsul-container" class="absolute left-0 right-0 flex gap-2 p-3 overflow-x-auto bg-transparent scrollbar-hide" style="z-index: 1000; top: 68px;">
        <span class="text-xs font-bold text-black bg-white px-3 py-1.5 rounded-full border-2 border-black">Memuat proyek aktif...</span>
    </div>

    <div id="map"></div>

    <button id="btn-tambah-pin" class="absolute bottom-6 left-6 bg-hijau-terang text-black w-14 h-14 rounded-full font-bold border-2 border-black shadow-md flex items-center justify-center hover:bg-green-400 transition-all text-3xl" style="z-index: 1000;">
        +
    </button>

    <div id="center-pin-container" class="hidden fixed inset-0 flex items-center justify-center pointer-events-none" style="z-index: 1500;">
        <div class="transform -translate-y-6 animate-pulse flex flex-col items-center w-12">
            <svg class="w-full h-auto text-red-600 drop-shadow-lg flex-shrink-0" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
            <div class="w-2 h-1 bg-black bg-opacity-40 rounded-full blur-[1px] -mt-0.5"></div>
        </div>
    </div>

    <div id="konfirmasi-lokasi-container" class="hidden fixed bottom-10 left-1/2 transform -translate-x-1/2" style="z-index: 1500;">
        <button id="btn-konfirmasi-lokasi" class="bg-black text-white px-6 py-3 rounded-full font-bold shadow-2xl tracking-wide hover:bg-gray-800 transition-all flex items-center gap-2 border-2 border-white">
            📍 Gunakan Lokasi Ini
        </button>
    </div>

    <div id="pin-auth-container" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4 transition-all duration-300" style="z-index: 2500;">
        <div id="pin-auth-form" class="modal-center bg-hijau-terang rounded-2xl p-6 relative border-2 border-black shadow-md text-black">
            <button id="close-pin-auth" class="absolute top-3 right-4 text-2xl font-bold">&times;</button>
            
            <div class="text-center mb-4">
                <div class="w-12 h-12 bg-black text-hijau-terang rounded-xl flex items-center justify-center mx-auto mb-2 border-2 border-black">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold">Verifikasi Akses Editor</h2>
                <p class="text-xs font-semibold text-gray-800 mt-1">Masukkan PIN Rahasia untuk membuka form</p>
            </div>

            <form id="auth-form" class="space-y-4">
                <input type="password" id="input-pin-rahasia" placeholder="••••••" inputmode="numeric" pattern="[0-9]*" class="w-full p-3 rounded-xl border-2 border-black bg-white text-center text-2xl font-mono tracking-widest focus:outline-none" required>
                
                <div class="flex gap-2">
                    <button type="button" id="btn-batal-pin" class="w-1/2 bg-white border-2 border-black p-2.5 rounded-xl font-bold text-sm">Batal</button>
                    <button type="submit" class="w-1/2 bg-black text-white p-2.5 rounded-xl font-bold text-sm tracking-wide">Verifikasi</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center p-4" style="z-index: 2000;">
        <div id="modal-form" class="modal-center bg-hijau-terang rounded-2xl p-5 relative border-2 border-black shadow-md text-black">
            <button id="close-form" class="absolute top-2 right-4 text-3xl font-bold" style="z-index: 10;">&times;</button>
            <h2 class="text-xl font-bold mb-4 text-left tracking-tight">Tambahkan Pin Foto</h2>
            
            <form id="pin-form" class="space-y-3.5">
              //label input
                <div class="bg-hijau-terang rounded-xl flex gap-3 items-start">
    <div class="w-24 h-24 border-2 border-black rounded-xl flex flex-col items-center justify-center bg-white flex-shrink-0 relative">
        <input type="file" id="foto-input" multiple accept="image/*" class="hidden">
        <label for="foto-input" class="cursor-pointer text-center w-full h-full flex flex-col items-center justify-center">
            <span class="text-4xl font-bold leading-none">+</span>
            <span class="text-[10px] font-bold mt-1">Tambah foto</span>
        </label>
    </div>
    
    <div class="flex-1 space-y-1">
        <input type="text" id="label_foto_1" placeholder="Keterangan Foto 1 (Bisa diketik)" class="w-full px-2 py-1 text-xs bg-white border-2 border-black rounded-md focus:outline-none font-semibold">
        <input type="text" id="label_foto_2" placeholder="Keterangan Foto 2 (Bisa diketik)" class="w-full px-2 py-1 text-xs bg-white border-2 border-black rounded-md focus:outline-none font-semibold">
        <input type="text" id="label_foto_3" placeholder="Keterangan Foto 3 (Bisa diketik)" class="w-full px-2 py-1 text-xs bg-white border-2 border-black rounded-md focus:outline-none font-semibold">
        <input type="text" id="label_foto_4" placeholder="Keterangan Foto 4 (Bisa diketik)" class="w-full px-2 py-1 text-xs bg-white border-2 border-black rounded-md focus:outline-none font-semibold">
        <p class="text-[9px] font-bold mt-0.5 text-gray-700">*Maks 4 foto</p>
    </div>
</div>


                <div id="preview-container" class="grid grid-cols-4 gap-2 w-full"></div>

                <input type="text" id="nama_proyek" placeholder="Nama Project / Kegiatan" class="w-full p-2.5 text-sm rounded-xl border-2 border-black bg-white font-semibold focus:outline-none" required>
                <textarea id="deskripsi" placeholder="Deskripsi" class="w-full p-2.5 text-sm rounded-xl border-2 border-black bg-white font-semibold focus:outline-none" rows="2" required></textarea>
                
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <input type="text" placeholder="Waktu mulai" class="w-full p-2 text-xs rounded-xl border-2 border-black bg-white font-bold" onfocus="(this.type='datetime-local')" id="waktu_mulai" required>
                    </div>
                    <div class="w-1/2">
                        <input type="text" placeholder="Waktu selesai" class="w-full p-2 text-xs rounded-xl border-2 border-black bg-white font-bold" onfocus="(this.type='datetime-local')" id="waktu_selesai" required>
                    </div>
                </div>

                <input type="text" id="lokasi_teks" placeholder="Lokasi Project / kegiatan" class="w-full p-2.5 text-sm rounded-xl border-2 border-black bg-white font-semibold focus:outline-none" required>
                <input type="number" id="jumlah_anggota" placeholder="Jumlah anggota" class="w-full p-2.5 text-sm rounded-xl border-2 border-black bg-white font-semibold focus:outline-none" required>
                
                <div class="bg-white p-2.5 rounded-xl border-2 border-black flex justify-between items-center px-4">
                    <span class="font-bold text-xs">Status Kegiatan:</span>
                    <div class="flex gap-4 text-xs font-bold">
                        <label class="cursor-pointer flex items-center gap-1"><input type="radio" name="status_kegiatan" value="Selesai" checked class="accent-black"> Selesai</label>
                        <label class="cursor-pointer flex items-center gap-1"><input type="radio" name="status_kegiatan" value="Belum" class="accent-black"> Belum</label>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button type="button" id="btn-pilih-koordinat" class="w-1/2 bg-black text-white p-2.5 rounded-xl font-bold text-xs border-2 border-black tracking-wide">Atur pin di peta</button>
                    <input type="text" id="koordinat_display" placeholder="00.00,00.00" class="w-1/2 p-2.5 rounded-xl border-2 border-black bg-white text-center text-xs font-mono font-bold focus:outline-none" readonly required>
                </div>

                <div class="flex gap-2 pt-1.5">
                    <button type="button" id="btn-draft" class="w-1/3 bg-white border-2 border-black p-2.5 rounded-xl font-bold text-xs">Draft</button>
                    <button type="button" id="btn-batal" class="w-1/3 bg-white border-2 border-black p-2.5 rounded-xl font-bold text-xs text-red-600">Batal</button>
                    <button type="submit" class="w-1/3 bg-black text-white p-2.5 rounded-xl font-bold text-xs tracking-wide">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  
  //url project & api key serverless
  const SUPABASE_URL = window.VITE_SUPABASE_URL;
  const SUPABASE_ANON_KEY = window.VITE_SUPABASE_ANON_KEY;

  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const IMGBB_API_KEY = "SALIN_CLIENT_API_KEY_IMGBB_ANDA";

        // Inisialisasi Peta & Basemap Layer Kombinasi Filter Warna Biru Laut Cerah
        const map = L.map('map', { zoomControl: false }).setView([-2.5489, 118.0149], 5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '© OpenStreetMap contributors' 
        }).addTo(map);

        let koordinatTerpilih = null;
        let selectLocationMode = false;
        let uploadedFiles = [];
        let semuaMarker = {};

        const centerPinContainer = document.getElementById('center-pin-container');
        const konfirmasiLokasiContainer = document.getElementById('konfirmasi-lokasi-container');
        const btnKonfirmasiLokasi = document.getElementById('btn-konfirmasi-lokasi');

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 500);
                }
            }, 800);
        });

        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('dropdown-menu').classList.toggle('hidden');
        });

        const pinContainer = document.getElementById('pin-auth-container');
        const inputPin = document.getElementById('input-pin-rahasia');

        const bukaModalPin = () => {
            pinContainer.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('pin-auth-form').classList.add('show');
                inputPin.focus();
            }, 50);
        };

        const tutupModalPin = () => {
            document.getElementById('pin-auth-form').classList.remove('show');
            setTimeout(() => {
                pinContainer.classList.add('hidden');
                document.getElementById('auth-form').reset();
            }, 300);
        };

        const bukaModalAnimasi = () => {
            document.getElementById('modal-container').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-form').classList.add('show');
            }, 50);
        };

        const tutupForm = () => {
            document.getElementById('modal-form').classList.remove('show');
            setTimeout(() => {
                document.getElementById('modal-container').classList.add('hidden');
                document.getElementById('pin-form').reset();
                document.getElementById('preview-container').innerHTML = '';
                uploadedFiles = [];
                koordinatTerpilih = null;
            }, 300);
        };

        document.getElementById('btn-tambah-pin').addEventListener('click', bukaModalPin);
        document.getElementById('close-pin-auth').addEventListener('click', tutupModalPin);
        document.getElementById('btn-batal-pin').addEventListener('click', tutupModalPin);
        document.getElementById('close-form').addEventListener('click', tutupForm);
        document.getElementById('btn-batal').addEventListener('click', tutupForm);
        document.getElementById('btn-draft').addEventListener('click', () => { alert("Disimpan sebagai Draft lokal!"); tutupForm(); });

      //Sistem PIN
        
document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const pinDiinput = inputPin.value;
    alert("Sedang memverifikasi PIN secara aman via server...");

    try {
        // Langsung memanggil variabel global SUPABASE_URL dan SUPABASE_ANON_KEY yang sudah ada di awal script
        const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/verifikasi_pin_editor`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ input_pin: pinDiinput }) // Mengirim parameter ke Database Function Supabase
        });

        if (!response.ok) throw new Error("Koneksi ke server gagal");

        const isPinValid = await response.json(); // Mengembalikan nilai true atau false dari server

        if (isPinValid === true) {
            alert("Verifikasi Berhasil! Akses Editor Dibuka.");
            tutupModalPin();
            setTimeout(bukaModalAnimasi, 400); 
        } else {
            alert("PIN salah! Akses ditolak.");
            inputPin.value = '';
            inputPin.focus();
        }
    } catch (error) {
        console.error(error);
        alert("Gagal menghubungi server untuk verifikasi keamanan.");
    }
});


        document.getElementById('foto-input').addEventListener('change', (e) => {
            const container = document.getElementById('preview-container');
            container.innerHTML = '';
            uploadedFiles = Array.from(e.target.files).slice(0, 4); 
            uploadedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const box = document.createElement('div');
                    box.className = "relative text-center bg-white p-1 rounded-lg border-2 border-black";
                    box.innerHTML = `
                        <img src="${event.target.result}" class="w-full h-11 object-cover rounded border border-black" />
                        <span class="text-[9px] block font-bold text-black mt-0.5">Foto ${index+1}</span>
                    `;
                    container.appendChild(box);
                };
                reader.readAsDataURL(file);
            });
        });

        document.getElementById('btn-pilih-koordinat').addEventListener('click', () => {
            selectLocationMode = true;
            document.getElementById('modal-form').classList.remove('show');
            setTimeout(() => {
                document.getElementById('modal-container').classList.add('hidden');
                centerPinContainer.classList.remove('hidden');
                konfirmasiLokasiContainer.classList.remove('hidden');
            }, 300);
        });

        btnKonfirmasiLokasi.addEventListener('click', () => {
            if (selectLocationMode) {
                const centerLatLng = map.getCenter();
                koordinatTerpilih = centerLatLng;
                document.getElementById('koordinat_display').value = `${koordinatTerpilih.lat.toFixed(5)}, ${koordinatTerpilih.lng.toFixed(5)}`;
                
                selectLocationMode = false;
                centerPinContainer.classList.add('hidden');
                konfirmasiLokasiContainer.classList.add('hidden');
                bukaModalAnimasi();
            }
        });

        document.getElementById('pin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!koordinatTerpilih) return alert("Anda belum menentukan lokasi pin di peta!");
            alert("Sedang mengunggah berkas foto ke ImgBB & menyimpan proyek ke Supabase...");
            try {
                const fotoUrls = [];
                for (const file of uploadedFiles) {
                    const formData = new FormData();
                    formData.append('image', file);
                    const responseImg = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const resJson = await responseImg.json();
                    if(resJson.success) {
                        fotoUrls.push(resJson.data.url);
                    }
                }

                const dataPayload = {
    nama_proyek: document.getElementById('nama_proyek').value,
    deskripsi: document.getElementById('deskripsi').value,
    waktu_mulai: document.getElementById('waktu_mulai').value,
    waktu_selesai: document.getElementById('waktu_selesai').value,
    lokasi: document.getElementById('lokasi_teks').value,
    jumlah_anggota: parseInt(document.getElementById('jumlah_anggota').value),
    status_kegiatan: document.querySelector('input[name="status_kegiatan"]:checked').value,
    status_dokumen: "Simpan",
    latitude: koordinatTerpilih.lat,
    longitude: koordinatTerpilih.lng,
    foto_urls: fotoUrls,
    
    // MENYIMPAN TEKS INPUT LABEL KE DATABASE
    // (Pastikan di tabel Supabase kamu sudah membuat kolom/field dengan nama-nama di bawah ini jika ingin disimpan)
    label_foto_1: document.getElementById('label_foto_1').value,
    label_foto_2: document.getElementById('label_foto_2').value,
    label_foto_3: document.getElementById('label_foto_3').value,
    label_foto_4: document.getElementById('label_foto_4').value
};


                const resSupabase = await fetch(`${SUPABASE_URL}/rest/v1/pins`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(dataPayload)
                });

                if (!resSupabase.ok) throw new Error("Gagal menyimpan ke Supabase");
                alert("Proyek Berhasil Disimpan!");
                tutupForm();
                muatUlangPinDanKapsul();
            } catch (error) {
                console.error(error);
                alert("Gagal memproses data.");
            }
        });

        async function muatUlangPinDanKapsul() {
            try {
                const resSupabase = await fetch(`${SUPABASE_URL}/rest/v1/pins?select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                const dataPins = await resSupabase.json();
                const kapsulContainer = document.getElementById('kapsul-container');
                const kumpulanKoordinat = [];
                kapsulContainer.innerHTML = ''; 
                Object.values(semuaMarker).forEach(m => map.removeLayer(m));
                semuaMarker = {};

                dataPins.forEach((data, index) => {
                    const idDok = data.id || index;
                    const statusText = data.status_kegiatan === "Selesai" ? "SELESAI" : "BELUM SELESAI";
                    const warnaKapsul = data.status_kegiatan === "Selesai" ? "bg-green-400 border-black text-black" : "bg-yellow-300 border-black text-black";

                    let fotoHtml = '';
                    const listFoto = typeof data.foto_urls === 'string' ? JSON.parse(data.foto_urls) : data.foto_urls;
                    if(listFoto && listFoto.length > 0) {
                        listFoto.forEach((url, i) => {
                            fotoHtml += `
                                <div class="text-center bg-white p-0.5 rounded border border-black">
                                    <img src="${url}" class="w-full h-10 object-cover rounded border border-gray-400 cursor-pointer" onclick="window.open('${url}')" />
                                    <span class="text-[8px] font-bold block mt-0.5">Foto ${i+1}</span>
                                </div>`;
                        });
                    }

                    const isiPopup = `
                        <div class="font-sans text-black p-1" style="min-width:240px; max-width:280px;">
                            <h3 class="font-bold text-lg border-b-2 border-black pb-0.5 mb-2 tracking-tight">${data.nama_proyek}</h3>
                            <div class="space-y-1 text-xs font-semibold">
                                <p class="leading-relaxed"><b>Deskripsi:</b> ${data.deskripsi}</p>
                                <p><b>Status Kegiatan:</b> <span class="font-bold underline">${statusText}</span></p>
                                <p><b>Waktu Pelaksanaan:</b> <span class="text-[11px] block bg-white border border-black p-1 rounded mt-0.5">${data.waktu_mulai.replace('T',' ')} s/d ${data.waktu_selesai.replace('T',' ')}</span></p>
                                <p><b>Lokasi:</b> ${data.lokasi}</p>
                                <p><b>Jumlah Anggota:</b> ${data.jumlah_anggota} Personel</p>
                            </div>
                            <div class="mt-3 border-t-2 border-black pt-2">
                                <p class="text-[10px] font-bold mb-1">DOKUMENTASI FOTO:</p>
                                <div class="grid grid-cols-4 gap-1">${fotoHtml}</div>
                            </div>
                        </div>
                    `;

                    // Kustomisasi ikon pin Leaflet bawaan agar berwarna hijau terang bergaris tepi hitam pekat
                    const customIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class='w-6 h-6 bg-green-400 rounded-full border-2 border-black shadow-md flex items-center justify-center'><div class='w-2 h-2 bg-black rounded-full'></div></div>`,
                        iconSize: [24, 24],
                        iconAnchor: [12, 12]
                    });

                    const marker = L.marker([data.latitude, data.longitude], {icon: customIcon}).addTo(map).bindPopup(isiPopup);
                    semuaMarker[idDok] = marker;
                    kumpulanKoordinat.push([data.latitude, data.longitude]);

                    const tombolKapsul = document.createElement('button');
                    tombolKapsul.className = `whitespace-nowrap text-xs font-bold py-1.5 px-4 rounded-xl border-2 shadow-sm transition-transform active:scale-95 ${warnaKapsul}`;
                    tombolKapsul.style.marginRight = "6px";
                    tombolKapsul.innerText = data.nama_proyek;

                    tombolKapsul.addEventListener('click', () => {
                        map.flyTo([data.latitude, data.longitude], 15, { animate: true, duration: 1.2 });
                        setTimeout(() => semuaMarker[idDok].openPopup(), 1200);
                    });

                    kapsulContainer.appendChild(tombolKapsul);
                });

                if (kumpulanKoordinat.length > 0) {
                    const batasWilayah = L.latLngBounds(kumpulanKoordinat);
                    map.fitBounds(batasWilayah, { padding: [80, 80] });
                } else {
                    kapsulContainer.innerHTML = '<span class="text-xs font-bold text-black bg-white px-3 py-1.5 rounded-full border-2 border-black">Belum ada titik proyek terdaftar.</span>';
                }
            } catch(e) {
                document.getElementById('kapsul-container').innerHTML = '<span class="text-xs font-bold text-red-600 bg-white px-3 py-1.5 rounded-full border-2 border-black">Gagal memuat data database.</span>';
            }
        }

        muatUlangPinDanKapsul();
    </script>
</body>
</html>
